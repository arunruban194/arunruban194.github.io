<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Zer0Square</title>

   <!-- Open Graph -->
   <meta property="og:title" content="Zer0Square Game" />
   <meta property="og:description" content="A number-sorting puzzle game. Arrange tiles before 0 returns to its position!" />
   <meta property="og:image" content="assets/z0s.png" />
   <meta property="og:type" content="website" />

   <link rel="icon" href="assets/z0s.png" />
   <link rel="stylesheet" href="css/style.css" />
</head>

<body>

   <!-- ===== Title Bar (always visible) ===== -->
   <header class="title-bar">&#128293; Zer0Square Game &#128293;</header>

   <!-- ===== Home View: Level Select ===== -->
   <main id="view-home" class="view">
      <h2 class="level-select-heading">Choose the level:</h2>

      <div class="level-grid">
         <a href="#/level/1">
            <img src="assets/lv1.png" alt="Level 1" />
         </a>
         <a href="#/level/2">
            <img src="assets/lv2.png" alt="Level 2" />
         </a>
         <a href="#/level/3">
            <img src="assets/lv3.png" alt="Level 3" />
         </a>
         <a href="#/level/4">
            <img src="assets/lv4.png" alt="Level 4" />
         </a>
         <a href="#/level/5">
            <img src="assets/lv5.png" alt="Level 5" />
         </a>
         <a href="#/level/6">
            <img src="assets/lv6.png" alt="Level 6" />
         </a>
      </div>

      <!-- Custom levels: player picks grid size -->
      <h2 class="level-select-heading custom-heading">Custom Levels</h2>

      <div class="custom-levels">
         <!-- Level 7 — Near rule, custom grid -->
         <div class="custom-card">
            <h3>Level 7 &mdash; Near</h3>
            <p class="custom-desc">Adjacent + diagonal swaps</p>
            <label for="grid-select-7">Grid size:</label>
            <select id="grid-select-7">
               <option value="6">6 &times; 6</option>
               <option value="7">7 &times; 7</option>
               <option value="8" selected>8 &times; 8</option>
               <option value="9">9 &times; 9</option>
               <option value="10">10 &times; 10</option>
            </select>
            <button id="btn-play-7" class="btn-play-custom" type="button">Play</button>
         </div>

         <!-- Level 8 — Strict rule, custom grid -->
         <div class="custom-card">
            <h3>Level 8 &mdash; Strict</h3>
            <p class="custom-desc">Adjacent only (no diagonals)</p>
            <label for="grid-select-8">Grid size:</label>
            <select id="grid-select-8">
               <option value="6">6 &times; 6</option>
               <option value="7">7 &times; 7</option>
               <option value="8" selected>8 &times; 8</option>
               <option value="9">9 &times; 9</option>
               <option value="10">10 &times; 10</option>
            </select>
            <button id="btn-play-8" class="btn-play-custom" type="button">Play</button>
         </div>
      </div>

      <footer class="footer">
         <a href="https://www.linkedin.com/in/arun-ruban-sj-048221191" target="_blank" rel="noopener noreferrer">
            <img src="assets/Ln.png" alt="LinkedIn" />
         </a>
         <a href="https://github.com/arunruban194" target="_blank" rel="noopener noreferrer" class="gh-link">
            <svg height="40" width="40" viewBox="0 0 16 16" fill="#333"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.63 7.63 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
         </a>
      </footer>
   </main>

   <!-- ===== Game View ===== -->
   <section id="view-game" class="view hidden">

      <!-- Toolbar: info buttons -->
      <nav class="toolbar">
         <button id="btn-back" type="button">&#8592; Back</button>
         <button id="btn-about" type="button">About</button>
         <button id="btn-howto" type="button">HowTo</button>
         <button id="btn-help" type="button">Help</button>
      </nav>

      <!-- Game controls -->
      <div id="game-controls" class="game-controls">
         <button id="btn-reset" type="button">Reset</button>
         <span id="level-badge" class="level-badge">Level : 1</span>
         <button id="btn-next" type="button">NextSet</button>
      </div>

      <!-- Dynamic board -->
      <div id="board-container" class="board-container"></div>

      <!-- Timer -->
      <div class="timer" id="timer">00:00:00</div>

      <footer class="footer">
         <a href="https://www.linkedin.com/in/arun-ruban-sj-048221191" target="_blank" rel="noopener noreferrer">
            <img src="assets/Ln.png" alt="LinkedIn" />
         </a>
         <a href="https://github.com/arunruban194" target="_blank" rel="noopener noreferrer" class="gh-link">
            <svg height="40" width="40" viewBox="0 0 16 16" fill="#333"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.63 7.63 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
         </a>
      </footer>
   </section>

   <!-- ===== Scripts ===== -->
   <script src="js/router.js"></script>
   <script src="js/levels.js"></script>
   <script src="js/rules.js"></script>
   <script src="js/game.js"></script>
   <script>
      // Register routes
      Router.on("/", () => Game.showHome());
      Router.on("/level/:n/:size", (params) => Game.startLevel(params.n, params.size));
      Router.on("/level/:n", (params) => Game.startLevel(params.n));

      // Boot
      Router.start();
   </script>

</body>

</html>
